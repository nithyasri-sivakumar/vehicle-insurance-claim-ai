{% extends 'base.html' %}
{% block title %}Register | ClaimVision AI{% endblock %}
{% block content %}
<section class="form-panel">
    <div class="form-header">
        <h2>Create Your Account</h2>
        <p>Register now to submit claims and view AI validation results.</p>
    </div>
    <form method="POST" class="auth-form">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required>
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a secure password" required>
        <button type="submit" class="button button-primary">Register</button>
        <p class="form-note">Already have an account? <a href="{{ url_for('main.login') }}">Login here</a>.</p>
    </form>
</section>
{% endblock %}
